# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🧪 Type Check
        run: yarn type-check

      - name: ✨ Lint Check
        run: yarn lint

      - name: 🏗️ Build
        run: yarn build

      - name: 🔐 Audit (optional)
        run: yarn audit || true

      - name: 💅 Prettier Format Check
        run: yarn format
